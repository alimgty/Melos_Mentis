<!DOCTYPE html>
<html>
<head>
  <title>Real-Time Emotion Detection</title>
  <link rel="icon" type="image/png" href="static/assets/images/favicon.png" />
  <link href="https://fonts.googleapis.com/css?family=Roboto:100" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class='light x1'></div>
  <div class='light x2'></div>
  <div class='light x3'></div>
  <div class='light x4'></div>
  <div class='light x5'></div>
  <div class='light x6'></div>
  <div class='light x7'></div>
  <div class='light x8'></div>
  <div class='light x9'></div>

  <div class="container">
    <div class="main-content">
      <div class="main-content-inner">
        <h1>Real-Time Emotion & Context-Based Detection</h1>
        <img src="{{ url_for('video') }}" width="640" height="480">
        <br>
        <button id="captureBtn" onclick="startCapture()">Start 30s Capture</button>
        <div id="message-box"></div>
        <div id="emotion-box" class="result-box"></div>
        <div id="object-box" class="result-box"></div>
        <div style="margin-top: 10px; text-align: center;">
          <button onclick="startMusicTherapy()" style="padding: 8px 16px; font-size: 15px;">Start Music Therapy</button>
        </div>
        <div id="audio-container"></div>
      </div>
    </div>

<div class="chatbot-panel">
  <div class="chatbot-intro" id="chatbot-intro">
    <img src="static\assets\images\botcute.png" alt="Chatbot" class="chatbot-icon">
    <h3>Welcome to AI Doc-Bot</h3>
    <p>I can help you understand your emotions and suggest activities.</p>
    <button onclick="startChat()" class="start-chat-btn">Let's Start</button>
  </div>
  
  <div class="chatbot-interface" id="chatbot-interface" style="display:none;">
    <div class="chatbot-header">Chat with AI Doc-Bot!</div>
    <div class="chatbot-body" id="chat-body"></div>
    <div class="chatbot-input">
      <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
  </div>

  <script>
    async function startCapture() {
      const button = document.getElementById('captureBtn');
      const messageBox = document.getElementById('message-box');
      const emotionBox = document.getElementById('emotion-box');
      const objectBox = document.getElementById('object-box');
    
      messageBox.style.display = "none";
      emotionBox.style.display = "none";
      objectBox.style.display = "none";
    
      button.disabled = true;
      button.innerText = "Capturing (30s)...";
    
      try {
        const response = await fetch('/capture');
        const result = await response.json();
    
        button.innerText = "Start 30s Capture";
        button.disabled = false;
    
        if (result.message) {
          messageBox.innerText = result.message;
          messageBox.style.display = "block";
        }
    
        if (result.emotions && result.emotions.length > 0) {
          emotionBox.innerHTML = "<strong>Detected Emotions:</strong><br>" + result.emotions.join(', ');
          emotionBox.style.display = "inline-block";
        }
    
        if (result.objects && result.objects.length > 0) {
          objectBox.innerHTML = "<strong>Detected Objects:</strong><br>" + result.objects.join(', ');
          objectBox.style.display = "inline-block";
        }
    
      } catch (error) {
        console.error("Error:", error);
        messageBox.innerText = "An error occurred during capture.";
        messageBox.style.display = "block";
        button.innerText = "Start 30s Capture";
        button.disabled = false;
      }
    }
    
    
    function startMusicTherapy() {
      fetch('/start_music_therapy', {
        method: 'POST'
      })
      .then(response => response.json())
      .then(data => {
        if (data.status === "success") {
          document.getElementById('audio-container').innerHTML =
            `<p>Now playing therapeutic music:</p>
             <audio controls autoplay>
                 <source src="${data.audio_url}" type="audio/wav">
                 Your browser does not support the audio element.
             </audio>`;
        } else {
          alert("Error: " + data.message);
        }
      })
      .catch(err => {
        alert("Something went wrong: " + err);
      });
    }

    function startChat() {
      document.getElementById('chatbot-intro').style.display = 'none';
      
      document.getElementById('chatbot-interface').style.display = 'flex';
      
      const chatBody = document.getElementById('chat-body');
      chatBody.innerHTML += `
        <div class="chat-message bot-message">
          <strong>AI Assistant:</strong> Hello! I'm here to help you understand your emotions. 
          How are you feeling today?
        </div>
      `;
      
      chatBody.scrollTop = chatBody.scrollHeight;
    }
    
    function sendMessage() {
      const input = document.getElementById("chat-input");
      const chatBody = document.getElementById("chat-body");
      const userMessage = input.value.trim();
    
      if (!userMessage) return;
    
      chatBody.innerHTML += `<div class="chat-message user-message"><strong>You:</strong> ${userMessage}</div>`;
      input.value = "";
    
      fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userMessage }),
      })
        .then(response => response.json())
        .then(data => {
          const botMessage = data.response;
          chatBody.innerHTML += `<div class="chat-message bot-message"><strong>Bot:</strong> ${botMessage}</div>`;
          chatBody.scrollTop = chatBody.scrollHeight;
        })
        .catch(error => {
          console.error("Error:", error);
          chatBody.innerHTML += `<div class="chat-message" style="color: #ff6b6b;"><strong>Error:</strong> Failed to get response</div>`;
        });
    }


  </script>
</body>
</html>
